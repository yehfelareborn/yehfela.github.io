<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yehfela</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 80px 0;
      border-bottom: 1px solid var(--border);
    }

    section:last-of-type { border-bottom: none; }

    h2 {
      font-size: 1.1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
    }

    /* ── Hero ── */
    #hero {
      padding: 120px 0 80px;
    }

    #hero h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    #hero p {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.15s;
    }

    .links a:hover {
      border-color: var(--accent);
      text-decoration: none;
    }

    /* ── About ── */
    #about p {
      color: var(--muted);
      max-width: 600px;
    }

    #about p + p { margin-top: 12px; }

    /* ── Projects ── */
    .projects-grid {
      display: grid;
      gap: 16px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      transition: border-color 0.15s;
    }

    .project-card:hover { border-color: var(--accent); }

    .project-card h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .project-card h3 a { color: var(--text); }
    .project-card h3 a:hover { color: var(--accent); text-decoration: none; }

    .project-card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── Contact ── */
    #contact p {
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Footer ── */
    footer {
      padding: 32px 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Hero -->
  <section id="hero">
    <h1>yehfela</h1>
    <p>Software Engineer · Building things from scratch</p>
    <div class="links">
      <a href="https://github.com/yehfelareborn" target="_blank">
        GitHub
      </a>
      <a href="mailto:yeh.fela@gmail.com">
        Email
      </a>
    </div>
  </section>

  <!-- About -->
  <section id="about">
    <h2>About</h2>
    <p>Hi，我是 yehfela，一名軟體工程師。</p>
    <p>對系統設計、後端開發以及從零打造產品有濃厚興趣。</p>
  </section>

  <!-- Projects -->
  <section id="projects">
    <h2>Projects</h2>
    <div class="projects-grid">

      <div class="project-card">
        <h3><a href="https://github.com/yehfela/trip_agent" target="_blank">trip_agent</a></h3>
        <p>旅遊規劃 AI Agent，整合多個工具自動產生行程。</p>
        <div class="tags">
          <span class="tag">Go</span>
          <span class="tag">AI Agent</span>
        </div>
      </div>

    </div>
  </section>

  <!-- Contact -->
  <section id="contact">
    <h2>Contact</h2>
    <p>有任何問題或合作邀約，歡迎來信。</p>
    <a href="mailto:yeh.fela@gmail.com">yeh.fela@gmail.com</a>
  </section>

</div>

<footer>
  <div class="container">
    Built with HTML · <a href="https://github.com/yehfelareborn" target="_blank">GitHub</a>
  </div>
</footer>

</body>
</html>
